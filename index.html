<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Reels</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#0f0f10;--bg2:#18181b;--bg3:#222228;--bg4:#2c2c35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#7c5cfc;--accent2:#a78bfa;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text1:#f0ede8;--text2:#a09e9a;--text3:#6b6966;
}
body{background:var(--bg1);color:var(--text1);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s,min-width .2s;overflow:hidden}
.sidebar.collapsed{width:56px;min-width:56px}
.sidebar.collapsed .logo-text,.sidebar.collapsed .logo-sub,.sidebar.collapsed .nav-item span:not(.nav-icon),.sidebar.collapsed .nav-badge,.sidebar.collapsed .nav-section,.sidebar.collapsed .user-name,.sidebar.collapsed .user-plan{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px}
.sidebar.collapsed .logo{justify-content:center;padding:16px 10px}
.sidebar.collapsed .sidebar-footer{justify-content:center;padding:10px}
.sidebar-toggle{position:absolute;top:50%;transform:translateY(-50%);right:-12px;width:24px;height:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2);z-index:100;transition:.2s}
.sidebar-toggle:hover{background:var(--bg3);color:var(--text1)}
.sidebar-wrap{position:relative;display:flex;flex-shrink:0}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);padding:10px 10px 5px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--text2);transition:.15s;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text1)}
.nav-item.active{background:rgba(124,92,252,.15);color:var(--accent2)}
.nav-icon{font-size:17px;width:20px;text-align:center}
.nav-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;background:var(--accent);color:#fff}
.nav-badge.green{background:rgba(34,197,94,.2);color:var(--green)}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-plan{font-size:11px;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:.15s;font-family:inherit}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg4);color:var(--text1)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6d4ef0}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;margin-bottom:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-meta{font-size:11px;color:var(--text3);margin-top:5px}
.account-grid{display:grid;grid-template-columns:1fr;gap:6px}
.account-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:.15s;background:var(--bg3)}
.account-chip:hover{border-color:var(--border2)}
.account-chip.selected{border-color:var(--accent);background:rgba(124,92,252,.08)}
.account-chip.offline{opacity:.45;cursor:not-allowed}
.account-avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:rgba(124,92,252,.2);color:var(--accent2)}
.account-chip-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.account-chip-sub{font-size:10px;color:var(--text3)}
.account-chip-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:.15s;margin-left:auto}
.account-chip.selected .account-chip-check{background:var(--accent);border-color:var(--accent);color:#fff}
.pill{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600}
.pill-green{background:rgba(34,197,94,.15);color:var(--green)}
.pill-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.pill-purple{background:rgba(124,92,252,.15);color:var(--accent2)}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text1);font-size:13px;font-family:inherit;outline:none;transition:.15s}
.form-input:focus{border-color:var(--accent)}
.form-textarea{resize:none;height:80px;line-height:1.5}
.form-group{margin-bottom:14px}
.type-tabs{display:flex;gap:8px;margin-bottom:14px}
.type-tab{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg3);cursor:pointer;text-align:center;transition:.15s}
.type-tab.active{border-color:var(--accent);background:rgba(124,92,252,.1)}
.type-tab-icon{font-size:22px;margin-bottom:4px}
.type-tab-name{font-size:13px;font-weight:600}
.type-tab-desc{font-size:11px;color:var(--text3);margin-top:2px}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upload-zone:hover{border-color:var(--accent);background:rgba(124,92,252,.04)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone-icon{font-size:32px;margin-bottom:10px}
.upload-zone-title{font-size:14px;color:var(--text1);font-weight:500}
.upload-zone-sub{font-size:12px;color:var(--text3);margin-top:5px}

/* PROGRESS */
.progress-wrap{margin-top:12px;display:none}
.progress-bar-outer{width:100%;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.progress-bar-inner{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.progress-text{font-size:12px;color:var(--text3);margin-top:5px;text-align:center}

/* VIDEO PREVIEW */
.video-preview{margin-top:12px;display:none;border-radius:10px;overflow:hidden;border:1px solid var(--border2)}
.video-preview video{width:100%;max-height:200px;object-fit:cover;display:block}
.video-preview-info{padding:10px 12px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between}
.video-preview-name{font-size:12px;color:var(--text1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.video-preview-size{font-size:11px;color:var(--text3)}

/* THUMBNAIL */
.thumbnail-section{display:none}
.thumb-options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.thumb-opt{aspect-ratio:9/16;border-radius:8px;border:2px solid var(--border);cursor:pointer;overflow:hidden;position:relative;transition:.15s;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.thumb-opt:hover{border-color:var(--border2)}
.thumb-opt.active{border-color:var(--accent)}
.thumb-opt img{width:100%;height:100%;object-fit:cover}
.thumb-opt-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);font-size:9px;color:#fff;padding:3px;text-align:center}
.thumb-upload-btn{border:2px dashed var(--border2);flex-direction:column;gap:4px;font-size:11px;color:var(--text3)}
.thumb-upload-btn:hover{border-color:var(--accent);color:var(--accent2)}

/* MULTIPLE VIDEOS */
.videos-list{margin-top:10px}
.video-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.video-item-thumb{width:36px;height:36px;border-radius:6px;background:rgba(124,92,252,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.video-item-info{flex:1;min-width:0}
.video-item-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-item-size{font-size:11px;color:var(--text3)}
.video-item-status{font-size:10px;padding:2px 7px;border-radius:10px}
.status-uploading{background:rgba(245,158,11,.15);color:var(--amber)}
.status-done{background:rgba(34,197,94,.15);color:var(--green)}
.status-error{background:rgba(239,68,68,.15);color:var(--red)}

.time-slot{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tz-badge{background:rgba(124,92,252,.15);color:var(--accent2);font-size:10px;padding:3px 7px;border-radius:6px;font-weight:600;white-space:nowrap}
.queue-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.queue-item:last-child{border-bottom:none}
.queue-thumb{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(124,92,252,.15);overflow:hidden}
.queue-thumb img{width:100%;height:100%;object-fit:cover}
.queue-info{flex:1;min-width:0}
.queue-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-meta{font-size:11px;color:var(--text3);margin-top:2px}
.queue-time{text-align:right;flex-shrink:0}
.queue-time-main{font-size:13px;font-weight:600}
.queue-time-sub{font-size:11px;color:var(--text3)}
.loop-banner{background:linear-gradient(135deg,rgba(124,92,252,.12),rgba(167,139,250,.06));border:1px solid rgba(124,92,252,.25);border-radius:12px;padding:16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.loop-icon{width:40px;height:40px;background:rgba(124,92,252,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.progress-bar{width:100%;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.switch{position:relative;width:38px;height:22px;cursor:pointer;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-track{position:absolute;inset:0;background:var(--bg4);border-radius:11px;transition:.2s}
.switch input:checked+.switch-track{background:var(--accent)}
.switch-thumb{position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;pointer-events:none}
.switch input:checked~.switch-thumb{left:19px}
.summary-box{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.2);border-radius:10px;padding:14px}
.summary-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.summary-label{color:var(--text3)}
.summary-value{font-weight:500}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.criar-layout{display:grid;grid-template-columns:1fr 320px;gap:14px}
.loading{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:14px;color:var(--text2);font-weight:500}
.empty-sub{font-size:12px;margin-top:4px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;display:flex;align-items:center;gap:10px;z-index:1000;transform:translateY(100px);opacity:0;transition:.3s;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(34,197,94,.3);color:var(--green)}
.toast.error{border-color:rgba(239,68,68,.3);color:var(--red)}
select.form-input{appearance:none}
.day-btn{width:38px;height:38px;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:.15s}
.day-btn:hover{border-color:var(--accent2);color:var(--text1)}
.day-btn.active{border-color:var(--accent);background:rgba(124,92,252,.15);color:var(--accent2)}
.account-thumb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.account-thumb-row:last-child{border-bottom:none}
.account-thumb-preview{width:32px;height:32px;border-radius:6px;object-fit:cover;border:1px solid var(--border2)}
.account-thumb-upload{font-size:11px;color:var(--accent2);cursor:pointer;padding:4px 8px;border-radius:6px;border:1px dashed rgba(124,92,252,.4);background:rgba(124,92,252,.06)}
.account-thumb-upload:hover{background:rgba(124,92,252,.12)}
</style>
</head>
<body>

<div class="sidebar-wrap">
<div class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">🔁</div>
    <div>
      <div class="logo-text">Loop Reels</div>
      <div class="logo-sub">Painel de gestão</div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="navigate('dashboard')"><i class="ti ti-layout-dashboard nav-icon"></i><span>Visão Geral</span></div>
    <div class="nav-item" onclick="navigate('criar')"><i class="ti ti-circle-plus nav-icon"></i><span>Criar Post</span></div>
    <div class="nav-item" onclick="navigate('fila')"><i class="ti ti-list nav-icon"></i><span>Fila de Posts</span><span class="nav-badge" id="nav-badge-fila">0</span></div>
    <div class="nav-item" onclick="navigate('contas')"><i class="ti ti-brand-instagram nav-icon"></i><span>Contas</span></div>
    <div class="nav-section">Automação</div>
    <div class="nav-item" onclick="navigate('loop')"><i class="ti ti-refresh nav-icon"></i><span>Loop Automático</span><span class="nav-badge green" id="nav-loop-badge">OFF</span></div>
    <div class="nav-item" onclick="navigate('config')"><i class="ti ti-settings nav-icon"></i><span>Configurações</span></div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-avatar">L</div>
    <div><div class="user-name">Loop Reels</div><div class="user-plan" id="sidebar-accounts-count">carregando...</div></div>
  </div>
</div>
<div class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle">◀</div>
</div>

<div class="main">
  <div class="topbar">
    <div><div class="topbar-title" id="topbar-title">Visão Geral</div><div class="topbar-sub" id="topbar-sub">Carregando...</div></div>
    <div class="topbar-actions" id="topbar-actions">
      <button class="btn btn-primary" onclick="navigate('criar')"><i class="ti ti-circle-plus"></i>Novo Post</button>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spinner"></div><br>Carregando...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://loopreels-production.up.railway.app';
let allAccounts = [], allPosts = [], stats = {}, loopData = {};
let selectedAccounts = new Set();
let uploadedVideos = []; // [{name, url, thumbnailUrl, size}]
let selectedThumbnailUrl = null;
let accountThumbnails = {}; // {blogId: thumbnailUrl}
let selectedDays = new Set([1,2,3,4,5]); // Seg-Sex por padrão
let currentType = 'reel';
let timeSlots = ['09:00','13:00','19:00'];

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebar-toggle');
  sidebar.classList.toggle('collapsed');
  toggle.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success'?'✅ ':'❌ ') + msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className='toast', 3500);
}

async function api(method, path, body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API+path, opts);
  return res.json();
}

function formatSize(bytes) {
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/(1024*1024)).toFixed(1)+'MB';
}

function todayStr() {
  return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navMap = {dashboard:0,criar:1,fila:2,contas:3,loop:4,config:5};
  document.querySelectorAll('.nav-item')[navMap[page]]?.classList.add('active');
  const titles = {
    dashboard:['Visão Geral', todayStr()],
    criar:['Criar Post','Selecione tipo, mídias, contas e horário'],
    fila:['Fila de Posts','Todos os posts agendados e publicados'],
    contas:['Contas','Gerencie as contas conectadas'],
    loop:['Loop Automático','Esteira de conteúdo evergreen'],
    config:['Configurações','Ajustes do sistema']
  };
  document.getElementById('topbar-title').textContent = titles[page][0];
  document.getElementById('topbar-sub').textContent = titles[page][1];
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><br>Carregando...</div>';
  loadData().then(() => {
    const pages = {dashboard:renderDashboard,criar:renderCriar,fila:renderFila,contas:renderContas,loop:renderLoop,config:renderConfig};
    pages[page]?.();
  });
}

async function loadData() {
  try {
    const [a,p,s,l] = await Promise.all([api('GET','/api/accounts'),api('GET','/api/posts'),api('GET','/api/stats'),api('GET','/api/loop')]);
    allAccounts = a.accounts||[];
    allPosts = p.posts||[];
    stats = s.stats||{};
    loopData = l.loop||{};
    const active = allAccounts.filter(x=>x.instagram).length;
    document.getElementById('sidebar-accounts-count').textContent = `${active} conta${active!==1?'s':''} conectada${active!==1?'s':''}`;
    document.getElementById('nav-badge-fila').textContent = stats.totalScheduled||0;
    document.getElementById('nav-loop-badge').textContent = loopData.active?'ON':'OFF';
    document.getElementById('nav-loop-badge').className = `nav-badge${loopData.active?' green':''}`;
  } catch(e) { console.error(e); }
}

// ===== DASHBOARD =====
function renderDashboard() {
  const today = new Date().toISOString().slice(0,10);
  const todayPosts = allPosts.filter(p=>p.scheduledTime?.startsWith(today));
  const nextPosts = allPosts.filter(p=>p.status==='agendado').sort((a,b)=>a.scheduledTime?.localeCompare(b.scheduledTime)).slice(0,4);
  const activeAccounts = allAccounts.filter(a=>a.instagram);

  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="navigate('criar')"><i class="ti ti-circle-plus"></i>Novo Post</button>`;

    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Miniatura por conta (opcional):</div>

async function handleAccountThumb(event, blogId) {
  const file = event.target.files[0];
  if (!file) return;
  showToast('Enviando miniatura...');
  try {
    const formData = new FormData();
    formData.append('thumbnail', file);
    const res = await fetch(`${API}/api/upload/thumbnail`, {method:'POST', body:formData});
    const result = await res.json();
    if (result.success) {
      accountThumbnails[blogId] = result.url;
      renderAccountThumbnails();
      showToast('Miniatura da conta salva!');
    }
  } catch(e) { showToast('Erro: '+e.message, 'error'); }
}

async function handleFileSelect(files) {
  const fileArray = Array.from(files).slice(0, 10 - uploadedVideos.length);

  for (const file of fileArray) {
    const id = Date.now() + Math.random();
    uploadedVideos.push({ id, name: file.name, size: file.size, url: null, thumbnailUrl: null, status: 'uploading' });
    renderVideosList();
    updateSummary();

    try {
      const formData = new FormData();
      formData.append('video', file);

      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('progress-text').textContent = `Enviando ${file.name}...`;

      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API}/api/upload/video`);

      xhr.timeout = 300000;
      xhr.ontimeout = () => { reject(new Error('Timeout')); };

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          document.getElementById('progress-bar').style.width = pct + '%';
          document.getElementById('progress-text').textContent = `Enviando ${file.name}... ${pct}%`;
        }
      };

      const result = await new Promise((resolve, reject) => {
        xhr.onload = () => {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch { reject(new Error('Resposta inválida')); }
        };
        xhr.onerror = () => reject(new Error('Erro de conexão'));
        xhr.send(formData);
      });

      if (result.success) {
        const video = uploadedVideos.find(v => v.id === id);
        if (video) {
          video.url = result.url;
          video.thumbnailUrl = result.thumbnail;
          video.status = 'done';
        }

        // Adicionar thumbnail automática
        if (result.thumbnail && currentType === 'reel') {
          addThumbOption(result.thumbnail, 'Auto');
        }

        showToast(`${file.name} enviado com sucesso!`);
      } else {
        const video = uploadedVideos.find(v => v.id === id);
        if (video) video.status = 'error';
        showToast(`Erro ao enviar ${file.name}`, 'error');
      }
    } catch(e) {
      const video = uploadedVideos.find(v => v.id === id);
      if (video) video.status = 'error';
      showToast(`Erro: ${e.message}`, 'error');
    }

    renderVideosList();
    updateSummary();
  }

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Upload concluído!';
  setTimeout(() => { if(document.getElementById('progress-wrap')) document.getElementById('progress-wrap').style.display = 'none'; }, 2000);
}

function renderVideosList() {
  const list = document.getElementById('videos-list');
  if (!list) return;
  list.innerHTML = uploadedVideos.map(v => `
    <div class="video-item">
      <div class="video-item-thumb">🎬</div>
      <div class="video-item-info">
        <div class="video-item-name">${v.name}</div>
        <div class="video-item-size">${formatSize(v.size)}</div>
      </div>
      <span class="video-item-status ${v.status==='uploading'?'status-uploading':v.status==='done'?'status-done':'status-error'}">
        ${v.status==='uploading'?'⏳ Enviando':v.status==='done'?'✅ Pronto':'❌ Erro'}
      </span>
      <button class="btn btn-danger btn-sm" onclick="removeVideo(${uploadedVideos.indexOf(v)})" style="margin-left:8px"><i class="ti ti-x"></i></button>
    </div>`).join('');
}

function removeVideo(idx) {
  uploadedVideos.splice(idx, 1);
  renderVideosList();
  updateSummary();
}

function addThumbOption(url, label) {
  const container = document.getElementById('thumb-options');
  if (!container) return;
  const div = document.createElement('div');
  div.className = 'thumb-opt';
  div.innerHTML = `<img src="${url}" onerror="this.src=''"><div class="thumb-opt-label">${label}</div>`;
  div.onclick = () => selectThumb(url, div);
  container.insertBefore(div, container.firstChild);
  document.getElementById('thumb-section').style.display = 'block';
  if (!selectedThumbnailUrl) selectThumb(url, div);
}

function selectThumb(url, el) {
  document.querySelectorAll('.thumb-opt').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedThumbnailUrl = url;
  const sel = document.getElementById('thumb-selected');
  if (sel) { sel.style.display = 'block'; sel.textContent = '✅ Miniatura selecionada'; }
}

async function handleThumbnailUpload(file) {
  if (!file) return;
  showToast('Enviando miniatura...');
  try {
    const formData = new FormData();
    formData.append('thumbnail', file);
    const res = await fetch(`${API}/api/upload/thumbnail`, { method: 'POST', body: formData });
    const result = await res.json();
    if (result.success) {
      addThumbOption(result.url, 'Custom');
      showToast('Miniatura enviada!');
    } else {
      showToast('Erro ao enviar miniatura', 'error');
    }
  } catch(e) {
    showToast('Erro: ' + e.message, 'error');
  }
}

function setType(type) {
  currentType = type;
  document.getElementById('tab-post').classList.toggle('active', type==='post');
  document.getElementById('tab-reel').classList.toggle('active', type==='reel');
  document.getElementById('sum-type').textContent = type==='reel'?'Reel':'Post/Carrossel';
  document.getElementById('media-card-title').innerHTML = type==='reel'
    ? '<i class="ti ti-video"></i>Upload de vídeos <span style="color:var(--text3);font-weight:400;font-size:12px">— até 10 arquivos</span>'
    : '<i class="ti ti-photo"></i>Upload de imagens <span style="color:var(--text3);font-weight:400;font-size:12px">— até 10 arquivos</span>';
  document.getElementById('file-input').accept = type==='reel'?'video/*':'image/*';
  document.getElementById('upload-icon').textContent = type==='reel'?'🎬':'🖼️';
  document.getElementById('upload-title').textContent = type==='reel'?'Clique ou arraste os vídeos aqui':'Clique ou arraste as imagens aqui';
  document.getElementById('upload-sub').textContent = type==='reel'?'MP4, MOV · máx 500MB por arquivo':'JPG, PNG · carrossel de até 10 imagens';
  document.getElementById('thumb-section').style.display = type==='reel'?'block':'none';
  uploadedVideos = [];
  renderVideosList();
  updateSummary();
}

function toggleAccount(id) {
  if (selectedAccounts.has(id)) { selectedAccounts.delete(id); document.getElementById('chip-'+id)?.classList.remove('selected'); }
  else { selectedAccounts.add(id); document.getElementById('chip-'+id)?.classList.add('selected'); }
  renderAccountThumbnails();
  updateSummary();
}

function toggleAllAccounts() {
  const ids = allAccounts.filter(a=>a.instagram).map(a=>String(a.id));
  const allSel = ids.every(id=>selectedAccounts.has(id));
  ids.forEach(id => {
    if (allSel) { selectedAccounts.delete(id); document.getElementById('chip-'+id)?.classList.remove('selected'); }
    else { selectedAccounts.add(id); document.getElementById('chip-'+id)?.classList.add('selected'); }
  });
  document.getElementById('toggle-all').textContent = allSel?'Selecionar todas':'Desmarcar todas';
  updateSummary();
}

function removeTimeSlot(i) { if(timeSlots.length>1){timeSlots.splice(i,1);renderTimeSlots();} }

function toggleDay(i) {
  if(selectedDays.has(i)) selectedDays.delete(i);

function updateCharCount() {
  const val = document.getElementById('legenda')?.value||'';
  if(document.getElementById('char-count')) document.getElementById('char-count').textContent = `${val.length} / 2200`;
  if(document.getElementById('hash-count')) document.getElementById('hash-count').textContent = `${(val.match(/#\w+/g)||[]).length} hashtags`;
}

function updateSummary() {
  const readyVideos = uploadedVideos.filter(v=>v.status==='done').length;
  const nAccounts = selectedAccounts.size;
  const nTimes = timeSlots.length;
  const nDays = selectedDays.size;
  const total = readyVideos * nAccounts * nTimes * nDays;
  const label = currentType==='reel'?'vídeo(s)':'imagem(s)';
  const el = id => document.getElementById(id);
  if(el('sum-media')) el('sum-media').textContent = `${readyVideos} ${label}`;
  if(el('sum-accounts')) el('sum-accounts').textContent = `${nAccounts} conta(s)`;
  if(el('sum-times')) el('sum-times').textContent = `${nTimes} horário(s) · ${nDays} dia(s)/sem`;
  if(el('sum-total')) el('sum-total').textContent = total;
  if(el('btn-total')) el('btn-total').textContent = total;
  if(el('accounts-selected-label')) el('accounts-selected-label').textContent = `${nAccounts} de ${allAccounts.filter(a=>a.instagram).length} selecionadas`;
}

async function agendarPost() {
  const readyVideos = uploadedVideos.filter(v=>v.status==='done');
  const caption = document.getElementById('legenda')?.value||'';
  const blogIds = [...selectedAccounts];
  const shuffle = document.getElementById('shuffle-toggle')?.checked || false;
  if(readyVideos.length===0) return showToast('Aguarde o upload dos vídeos!','error');
  if(blogIds.length===0) return showToast('Selecione pelo menos 1 conta!','error');
  if(selectedDays.size===0) return showToast('Selecione pelo menos 1 dia!','error');

  // Função para embaralhar array (Fisher-Yates)
  function shuffleArray(arr) {
    const a = [...arr];
    for(let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Gerar datas+horários ordenados
  const slots = [];
  const now = new Date();
  for(let i = 0; i < 60; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    if(selectedDays.has(d.getDay())) {
      for(const time of timeSlots) {
        slots.push(`${d.toISOString().slice(0,10)}T${time}:00`);
      }
    }
  }

  if(slots.length===0) return showToast('Nenhuma data encontrada!','error');

  let total = 0;
  const btn = document.getElementById('btn-agendar');
  if(btn) { btn.disabled = true; btn.textContent = 'Agendando...'; }

  for(const blogId of blogIds) {
    // Cada conta tem sua própria ordem de vídeos
    const videosForAccount = shuffle ? shuffleArray(readyVideos) : [...readyVideos];
    const thumbForAccount = accountThumbnails[blogId] || selectedThumbnailUrl || null;

    // Cada vídeo vai para um slot diferente — 1 vídeo por slot
    for(let i = 0; i < videosForAccount.length; i++) {
      if(i >= slots.length) break; // não agenda além dos slots disponíveis
      const video = videosForAccount[i];
      const scheduledTime = slots[i];
      const res = await api('POST','/api/posts',{
        mediaUrl: video.url,
        thumbnailUrl: thumbForAccount,
        caption,
        scheduledTime,
        blogIds: [blogId],
        type: currentType.toUpperCase()
      });
      if(res.success) total++;
    }
  }

  if(btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-calendar-check"></i>Agendar posts'; }
  showToast(`${total} post(s) agendado(s) com sucesso!`);
  setTimeout(()=>navigate('fila'),1500);
}

let filaFilter = 'todos';
let selectedPosts = new Set();

  });

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

        <button onclick="setFilaFilter('publicado')" class="btn btn-sm ${filaFilter==='publicado'?'btn-primary':'btn-ghost'}">✅ Publicados (${stats.totalPublished||0})</button>
        <button onclick="setFilaFilter('erro')" class="btn btn-sm ${filaFilter==='erro'?'btn-primary':'btn-ghost'}">❌ Erros (${stats.totalError||0})</button>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">

function setFilaFilter(filter) {
  filaFilter = filter;
  renderFila();
}

function togglePostSelect(id) {
  const check = document.getElementById('post-check-'+id);
  if(selectedPosts.has(id)) {
    selectedPosts.delete(id);
    if(check) { check.style.background='var(--bg3)'; check.style.borderColor='var(--border2)'; check.textContent=''; }
  } else {
    selectedPosts.add(id);
    if(check) { check.style.background='var(--accent)'; check.style.borderColor='var(--accent)'; check.textContent='✓'; check.style.color='#fff'; }
  }
  const btn = document.getElementById('btn-delete-selected');
  const count = document.getElementById('selected-count');
  if(btn) btn.style.display = selectedPosts.size > 0 ? 'inline-flex' : 'none';
  if(count) count.textContent = selectedPosts.size;
}

function toggleSelectAll() {
  const filtered = allPosts.filter(p => filaFilter==='todos' || p.status===filaFilter);
  const allSelected = filtered.every(p => selectedPosts.has(String(p.id)));
  filtered.forEach(p => {
    const id = String(p.id);
    const check = document.getElementById('post-check-'+id);
    if(allSelected) {
      selectedPosts.delete(id);
      if(check) { check.style.background='var(--bg3)'; check.style.borderColor='var(--border2)'; check.textContent=''; }
    } else {
      selectedPosts.add(id);
      if(check) { check.style.background='var(--accent)'; check.style.borderColor='var(--accent)'; check.textContent='✓'; check.style.color='#fff'; }
    }
  });
  const btn = document.getElementById('btn-delete-selected');
  const count = document.getElementById('selected-count');
  if(btn) btn.style.display = selectedPosts.size > 0 ? 'inline-flex' : 'none';
  if(count) count.textContent = selectedPosts.size;
}

async function deleteSelected() {
  if(selectedPosts.size === 0) return;
  if(!confirm(`Apagar ${selectedPosts.size} post(s) selecionado(s)?`)) return;
  let deleted = 0;
  for(const id of selectedPosts) {
    const res = await api('DELETE', `/api/posts/${id}`);
    if(res.success) deleted++;
  }
  showToast(`${deleted} post(s) apagado(s)!`);
  selectedPosts = new Set();
  await loadData();
  renderFila();
}

async function deleteByFilter(filter) {
  const toDelete = filter==='todos' ? allPosts : allPosts.filter(p => p.status===filter);
  if(toDelete.length === 0) return showToast('Nenhum post para apagar!', 'error');
  const label = filter==='todos'?'TODOS os posts':filter==='agendado'?'posts agendados':filter==='publicado'?'posts publicados':'posts com erro';
  if(!confirm(`Apagar ${toDelete.length} ${label}? Esta ação não pode ser desfeita!`)) return;
  let deleted = 0;
  for(const p of toDelete) {
    const res = await api('DELETE', `/api/posts/${p.id}`);
    if(res.success) deleted++;
  }
  showToast(`${deleted} post(s) apagado(s)!`);
  await loadData();
  renderFila();
}

async function deletePost(id) {
  if(!confirm('Excluir este post?')) return;
  const res = await api('DELETE',`/api/posts/${id}`);
  if(res.success){showToast('Post excluído!'); await loadData(); renderFila();}
  else showToast('Erro ao excluir!','error');
}

    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-video"></i>Adicionar vídeo ao loop</div>
      <div class="upload-zone" id="loop-upload-zone" style="margin-bottom:12px">
        <input type="file" accept="video/*" onchange="handleLoopVideoUpload(this.files[0])">
        <div class="upload-zone-icon">🎬</div>
        <div class="upload-zone-title">Clique para adicionar vídeo ao loop</div>
        <div class="upload-zone-sub">MP4, MOV · máx 500MB</div>
      </div>
      <div class="form-group">
        <label class="form-label">Legenda do vídeo</label>
        <textarea class="form-input form-textarea" id="loop-video-caption" placeholder="Legenda para este vídeo..."></textarea>
      </div>
    </div>
    ${loopData.videos?.length>0?`
    <div class="card">
      <div class="card-title"><i class="ti ti-list"></i>Vídeos no ciclo (${loopData.videos.length})</div>
      ${loopData.videos.map((v,i)=>`
        <div class="queue-item">
          <div style="font-size:12px;color:var(--text3);width:24px;text-align:center">${i+1}</div>
          <div class="queue-thumb">${v.thumbnailUrl?`<img src="${v.thumbnailUrl}" onerror="this.parentElement.textContent='🎬'">`:'🎬'}</div>
          <div class="queue-info"><div class="queue-title">${v.url?.slice(0,50)}...</div><div class="queue-meta">${v.caption?.slice(0,40)||'Sem legenda'}</div></div>
          ${i===loopData.currentIndex?'<span class="pill pill-purple">atual</span>':''}
          <button class="btn btn-danger btn-sm" onclick="removeLoopVideo(${i})" style="margin-left:8px"><i class="ti ti-trash"></i></button>
        </div>`).join('')}
    </div>`:''}`;
}

async function handleLoopVideoUpload(file) {
  if (!file) return;
  showToast('Enviando vídeo para o loop...');
  try {
    const formData = new FormData();
    formData.append('video', file);
    const res = await fetch(`${API}/api/upload/video`, {method:'POST',body:formData});
    const result = await res.json();
    if (result.success) {
      const caption = document.getElementById('loop-video-caption')?.value||'';
      const videos = [...(loopData.videos||[]), {url:result.url, thumbnailUrl:result.thumbnail, caption}];
      await api('PUT','/api/loop',{videos});
      showToast('Vídeo adicionado ao loop!');
      await loadData();
      renderLoop();
    } else {
      showToast('Erro ao enviar vídeo','error');
    }
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

async function toggleLoop(active) {
  await api('PUT','/api/loop',{active});
  showToast(active?'Loop ativado!':'Loop desativado!');
  await loadData();
  renderLoop();
}

async function removeLoopVideo(i) {
  const videos = [...(loopData.videos||[])];
  videos.splice(i,1);
  await api('PUT','/api/loop',{videos});
  showToast('Vídeo removido!');
  await loadData();
  renderLoop();
}
